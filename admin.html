<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Connect - Admin Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#fff;
      width:350px;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      text-align:center;
    }

    h2{
      color:#c70000;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ddd;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#c70000;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#990000;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>🩸 Blood Connect Admin</h2>

  <input type="email" id="email"
    placeholder="Admin Email">

  <input type="password" id="password"
    placeholder="Password">

  <button id="loginBtn">
    Login
  </button>

</div>

<script type="module">

import { auth } from "./firebase-config.js";

import {
 signInWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


document
.getElementById("loginBtn")
.addEventListener("click", () => {

 const email =
 document.getElementById("email").value;

 const password =
 document.getElementById("password").value;

 signInWithEmailAndPassword(
   auth,
   email,
   password
 )
 .then(() => {

   alert("Login Successful");

   window.location.href =
   "dashboard.html";

 })
 .catch((error) => {

   alert("Invalid Email or Password");

 });

});

</script>

</body>
</html>
